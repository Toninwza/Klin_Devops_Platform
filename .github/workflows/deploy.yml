name: Deploy DevOps MVP

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Nginx/Frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: infra/nginx/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-nginx:${{ github.sha }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: ./back
          file: ./back/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}

  deploy-to-ec2:
    needs: build-and-push-images
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote Deployment
        uses: appleboy/ssh-action@v0.1.10
        env:
          NGINX_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-nginx:${{ github.sha }}
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: NGINX_IMAGE,BACKEND_IMAGE
          script: |
            # Navigate to project directory
            cd /opt/klin-project

            # Export new image tags to override docker-compose placeholders
            export NGINX_IMAGE=$NGINX_IMAGE
            export BACKEND_IMAGE=$BACKEND_IMAGE

            # Authenticate to registry (Assuming ghcr.io PAT is exported on server)
            echo $GITHUB_TOKEN | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

            # Pull new images
            docker compose pull

            # Restart services with new images
            docker compose up -d

            # Cleanup dangling images
            docker image prune -af
